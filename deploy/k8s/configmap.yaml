apiVersion: v1
kind: ConfigMap
metadata:
  name: tasks-config
  namespace: techip
data:
  TASKS_PORT: "8082"
  DB_HOST: "host.docker.internal"  # для доступа к серверу с PostgreSQL
  DB_PORT: "5432"
  DB_NAME: "tasksdb"
  DB_SSLMODE: "disable"
  REDIS_ADDR: "host.docker.internal:6379"
  REDIS_DB: "0"
  CACHE_TTL_SECONDS: "120"
  CACHE_TTL_JITTER_SECONDS: "30"
  LOG_LEVEL: "info"