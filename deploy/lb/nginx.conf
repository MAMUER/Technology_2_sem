events {
    worker_connections 1024;
}

http {
    upstream tasks_cluster {
        # Алгоритм балансировки: round-robin (по умолчанию)
        server tasks_1:8082 max_fails=3 fail_timeout=30s;
        server tasks_2:8082 max_fails=3 fail_timeout=30s;
        server tasks_3:8082 max_fails=3 fail_timeout=30s;
        
        # Для проверки можно добавить вес
        # server tasks_1:8082 weight=3;
        # server tasks_2:8082 weight=2;
        # server tasks_3:8082 weight=1;
    }

    # Прокидываем заголовки для корректной работы
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID $http_x_request_id;

    server {
        listen 8080;
        server_name localhost;

        # Логирование
        access_log /var/log/nginx/access.log;
        error_log /var/log/nginx/error.log;

        # Health check endpoint (прокси на tasks)
        location /health {
            proxy_pass http://tasks_cluster/health;
            proxy_redirect off;
        }

        # API endpoints
        location /v1/tasks/ {
            proxy_pass http://tasks_cluster/v1/tasks/;
            proxy_set_header Authorization $http_authorization;
            proxy_redirect off;
            
            # Добавляем заголовок с именем инстанса (для отладки)
            add_header X-Upstream $upstream_addr;
        }

        location /v1/tasks {
            proxy_pass http://tasks_cluster/v1/tasks;
            proxy_set_header Authorization $http_authorization;
            proxy_redirect off;
            add_header X-Upstream $upstream_addr;
        }

        location /v1/tasks/search {
            proxy_pass http://tasks_cluster/v1/tasks/search;
            proxy_set_header Authorization $http_authorization;
            proxy_redirect off;
            add_header X-Upstream $upstream_addr;
        }

        # Метрики Prometheus
        location /metrics {
            proxy_pass http://tasks_cluster/metrics;
            proxy_redirect off;
        }

        # Корневая страница
        location / {
            return 200 "Tasks Load Balancer is working!\n\nAvailable endpoints:\n  GET  /health\n  GET  /v1/tasks\n  POST /v1/tasks\n  GET  /v1/tasks/{id}\n  PATCH /v1/tasks/{id}\n  DELETE /v1/tasks/{id}\n  GET  /v1/tasks/search?q={term}\n";
            add_header Content-Type text/plain;
        }
    }
}