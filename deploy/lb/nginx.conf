events {
    worker_connections 1024;
}

http {
    upstream tasks_cluster {
        server tasks_1:8082 max_fails=3 fail_timeout=30s;
        server tasks_2:8082 max_fails=3 fail_timeout=30s;
        server tasks_3:8082 max_fails=3 fail_timeout=30s;
    }

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID $http_x_request_id;

    server {
        listen 8080;
        server_name localhost;

        # Health check
        location /health {
            proxy_pass http://tasks_cluster/health;
            proxy_pass_header X-Instance-ID;
        }

        # Tasks endpoints
        location /v1/tasks/ {
            proxy_pass http://tasks_cluster/v1/tasks/;
            proxy_set_header Authorization $http_authorization;
            proxy_pass_header X-Instance-ID;
            add_header X-Upstream $upstream_addr;
        }

        location /v1/tasks {
            proxy_pass http://tasks_cluster/v1/tasks;
            proxy_set_header Authorization $http_authorization;
            proxy_pass_header X-Instance-ID;
            add_header X-Upstream $upstream_addr;
        }

        location /v1/tasks/search {
            proxy_pass http://tasks_cluster/v1/tasks/search;
            proxy_set_header Authorization $http_authorization;
            proxy_pass_header X-Instance-ID;
            add_header X-Upstream $upstream_addr;
        }

        location /metrics {
            proxy_pass http://tasks_cluster/metrics;
            proxy_pass_header X-Instance-ID;
        }

        location / {
            return 200 "Tasks Load Balancer is working!\n";
            add_header Content-Type text/plain;
        }
    }
}