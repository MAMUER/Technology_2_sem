version: '3.8'

services:
  # PostgreSQL база данных (общая для всех реплик)
  postgres:
    image: postgres:15-alpine
    container_name: pz26-postgres
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass
      POSTGRES_DB: tasksdb
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - pz26-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d tasksdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Auth сервис (один экземпляр)
  auth:
    build:
      context: ../..
      dockerfile: services/auth/Dockerfile
    container_name: pz26-auth
    environment:
      - AUTH_PORT=8081
      - AUTH_GRPC_PORT=50051
    networks:
      - pz26-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/v1/auth/verify", "--header=Authorization: Bearer demo-token-for-student"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # Реплика 1 tasks сервиса
  tasks_1:
    build:
      context: ../..
      dockerfile: services/tasks/Dockerfile
    container_name: pz26-tasks-1
    environment:
      - TASKS_PORT=8082
      - AUTH_GRPC_ADDR=auth:50051
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=appuser
      - DB_PASSWORD=apppass
      - DB_NAME=tasksdb
      - DB_SSLMODE=disable
      - INSTANCE_ID=tasks-1
    depends_on:
      postgres:
        condition: service_healthy
      auth:
        condition: service_healthy
    networks:
      - pz26-network
    restart: unless-stopped

  # Реплика 2 tasks сервиса
  tasks_2:
    build:
      context: ../..
      dockerfile: services/tasks/Dockerfile
    container_name: pz26-tasks-2
    environment:
      - TASKS_PORT=8082
      - AUTH_GRPC_ADDR=auth:50051
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=appuser
      - DB_PASSWORD=apppass
      - DB_NAME=tasksdb
      - DB_SSLMODE=disable
      - INSTANCE_ID=tasks-2
    depends_on:
      postgres:
        condition: service_healthy
      auth:
        condition: service_healthy
    networks:
      - pz26-network
    restart: unless-stopped

  # Реплика 3 tasks сервиса
  tasks_3:
    build:
      context: ../..
      dockerfile: services/tasks/Dockerfile
    container_name: pz26-tasks-3
    environment:
      - TASKS_PORT=8082
      - AUTH_GRPC_ADDR=auth:50051
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=appuser
      - DB_PASSWORD=apppass
      - DB_NAME=tasksdb
      - DB_SSLMODE=disable
      - INSTANCE_ID=tasks-3
    depends_on:
      postgres:
        condition: service_healthy
      auth:
        condition: service_healthy
    networks:
      - pz26-network
    restart: unless-stopped

  # NGINX как load balancer
  nginx:
    image: nginx:alpine
    container_name: pz26-nginx
    ports:
      - "8080:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - tasks_1
      - tasks_2
      - tasks_3
    networks:
      - pz26-network
    restart: unless-stopped

networks:
  pz26-network:
    driver: bridge

volumes:
  postgres-data: