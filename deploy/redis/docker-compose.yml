version: '3.8'

services:
  redis-node-1:
    image: redis:7-alpine
    container_name: redis-node-1
    command: redis-server --port 6379 --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes
    ports:
      - "6379:6379"
      - "16379:16379"
    volumes:
      - redis-data-1:/data
    networks:
      - redis-network
    restart: unless-stopped

  redis-node-2:
    image: redis:7-alpine
    container_name: redis-node-2
    command: redis-server --port 6380 --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes
    ports:
      - "6380:6380"
      - "16380:16380"
    volumes:
      - redis-data-2:/data
    networks:
      - redis-network
    restart: unless-stopped

  redis-node-3:
    image: redis:7-alpine
    container_name: redis-node-3
    command: redis-server --port 6381 --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes
    ports:
      - "6381:6381"
      - "16381:16381"
    volumes:
      - redis-data-3:/data
    networks:
      - redis-network
    restart: unless-stopped

  redis-cluster-init:
    image: redis:7-alpine
    container_name: redis-cluster-init
    depends_on:
      - redis-node-1
      - redis-node-2
      - redis-node-3
    networks:
      - redis-network
    entrypoint: >
      sh -c "
      echo 'Waiting for Redis nodes to start...' &&
      sleep 10 &&
      echo 'Creating Redis cluster...' &&
      redis-cli --cluster create redis-node-1:6379 redis-node-2:6380 redis-node-3:6381 --cluster-replicas 0 --cluster-yes &&
      echo 'Redis cluster created successfully!'
      "

networks:
  redis-network:
    driver: bridge

volumes:
  redis-data-1:
  redis-data-2:
  redis-data-3: