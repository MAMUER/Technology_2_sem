# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: CI/CD Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.25"
  REGISTRY: ghcr.io

jobs:
  test:
    name: Test and Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Run vet
        run: go vet ./...

      - name: Run tests
        run: go test -v ./...

  build:
    name: Build Binaries
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Create bin directory
        run: mkdir -p bin

      - name: Build Auth Service
        run: go build -o bin/auth-service ./services/auth/cmd/auth

      - name: Build Tasks Service
        run: go build -o bin/tasks-service ./services/tasks/cmd/tasks

      - uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: bin/
          retention-days: 7

  docker:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Prepare repository name
        id: repo-name
        run: |
          REPO="${{ github.repository }}"
          REPO_LOWER=$(echo $REPO | tr '[:upper:]' '[:lower:]')
          echo "repo_lower=$REPO_LOWER" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract metadata for Auth
        id: meta-auth
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.repo-name.outputs.repo_lower }}/auth
          tags: |
            type=sha,format=short
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Auth image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/auth/Dockerfile
          push: true
          tags: ${{ steps.meta-auth.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata for Tasks
        id: meta-tasks
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.repo-name.outputs.repo_lower }}/tasks
          tags: |
            type=sha,format=short
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Tasks image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/tasks/Dockerfile
          push: true
          tags: ${{ steps.meta-tasks.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    outputs:
      lb_results: ${{ steps.lb_test.outputs.lb_results }}
      summary: ${{ steps.collect_results.outputs.summary }}
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add host to known_hosts
        run: ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Create .env file
        run: |
          cat > .env << EOF
          POSTGRES_USER=${{ vars.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ vars.POSTGRES_PASSWORD }}
          POSTGRES_DB=${{ vars.POSTGRES_DB }}
          GRAFANA_ADMIN_USER=${{ vars.GRAFANA_ADMIN_USER }}
          GRAFANA_ADMIN_PASSWORD=${{ vars.GRAFANA_ADMIN_PASSWORD }}
          AUTH_PORT=8081
          AUTH_GRPC_PORT=50051
          TASKS_PORT=8082
          AUTH_GRPC_ADDR=auth:50051
          DB_HOST=postgres
          DB_PORT=5432
          DB_NAME=${{ vars.POSTGRES_DB }}
          DB_SSLMODE=disable
          EOF

      - name: Prepare server
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} '
            mkdir -p /opt/techip
            mkdir -p /opt/techip/certs
            mkdir -p /opt/techip/deploy/lb
          '

      - name: Copy configuration files
        run: |
          scp -o StrictHostKeyChecking=no .env ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/techip/
          scp -o StrictHostKeyChecking=no docker-compose.prod.yml ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/techip/docker-compose.yml
          scp -o StrictHostKeyChecking=no deploy/tls/nginx.conf ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/techip/nginx.conf
          scp -o StrictHostKeyChecking=no deploy/monitoring/prometheus.yml ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/techip/prometheus.yml
          scp -o StrictHostKeyChecking=no deploy/tls/init.sql ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/techip/init.sql
          scp -o StrictHostKeyChecking=no deploy/lb/docker-compose.yml ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/techip/deploy/lb/docker-compose.yml
          scp -o StrictHostKeyChecking=no deploy/lb/nginx.conf ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/techip/deploy/lb/nginx.conf

      - name: Deploy production stack
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} '
            cd /opt/techip
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker-compose pull
            docker-compose up -d
            docker image prune -f
            sleep 10
          '

      - name: Test production API
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} '
            cd /opt/techip
            
            echo "=== TESTING PRODUCTION API ==="
            
            echo "1. Login:"
            LOGIN_RESPONSE=$(curl -s -X POST http://localhost:8081/v1/auth/login \
              -H "Content-Type: application/json" \
              -d "{\"username\":\"student\",\"password\":\"student\"}")
            echo "$LOGIN_RESPONSE"
            
            echo "2. Create task:"
            TASK_RESPONSE=$(curl -s -X POST http://localhost:8082/v1/tasks \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer demo-token-for-student" \
              -d "{\"title\":\"Test from CI\",\"description\":\"Auto test\",\"due_date\":\"2026-03-15\"}")
            echo "$TASK_RESPONSE"
            
            echo "3. List tasks:"
            TASKS_RESPONSE=$(curl -s -X GET http://localhost:8082/v1/tasks \
              -H "Authorization: Bearer demo-token-for-student")
            echo "$TASKS_RESPONSE"
            
            echo "4. Verify token:"
            VERIFY_RESPONSE=$(curl -s -X GET http://localhost:8081/v1/auth/verify \
              -H "Authorization: Bearer demo-token-for-student")
            echo "$VERIFY_RESPONSE"
            
            echo "5. Health check:"
            HEALTH_RESPONSE=$(curl -s http://localhost:8082/health)
            echo "$HEALTH_RESPONSE"
            
            echo "6. Metrics endpoint:"
            METRICS_RESPONSE=$(curl -s http://localhost:8082/metrics | grep -E "http_requests_total|http_request_duration" | head -5)
            echo "$METRICS_RESPONSE"
          '

      - name: Test load balancing
        id: lb_test
        run: |
          TEMP_FILE=$(mktemp)
          
          ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} '
            set -e
            cd /opt/techip
            
            # Копируем файлы для теста
            cp deploy/lb/docker-compose.yml docker-compose.lb.yml
            cp deploy/lb/nginx.conf nginx.lb.conf
            
            # Исправляем путь к конфигу в compose файле (меняем ./nginx.conf на ./nginx.lb.conf)
            sed -i "s|./nginx.conf|./nginx.lb.conf|" docker-compose.lb.yml
            
            echo "=== STARTING LOAD BALANCER TEST ==="
            docker-compose -f docker-compose.lb.yml pull
            docker-compose -f docker-compose.lb.yml up -d
            sleep 15
            
            # Проверяем, что все контейнеры запущены (особенно nginx)
            if ! docker-compose -f docker-compose.lb.yml ps | grep -q "nginx.*Up"; then
              echo "=== NGINX FAILED TO START, LOGS: ==="
              docker-compose -f docker-compose.lb.yml logs nginx
              exit 1
            fi
            
            # Создаем файл с результатами
            RESULT_FILE="/tmp/lb_results_$(date +%s).txt"
            
            echo "=== ROUND-ROBIN TEST ===" > $RESULT_FILE
            for i in {1..6}; do
              INSTANCE=$(curl -s -I http://localhost:8080/v1/tasks \
                -H "Authorization: Bearer demo-token-for-student" \
                -H "X-Request-ID: lb-test-$i" | grep -i "X-Instance-ID" | tr -d '\r\n' || echo "NO HEADER")
              echo "Request $i: $INSTANCE" >> $RESULT_FILE
            done
            
            echo "" >> $RESULT_FILE
            echo "=== FAILOVER TEST ===" >> $RESULT_FILE
            echo "Stopping tasks_2..." >> $RESULT_FILE
            docker stop pz26-tasks-2
            sleep 5
            
            for i in {1..3}; do
              INSTANCE=$(curl -s -I http://localhost:8080/v1/tasks \
                -H "Authorization: Bearer demo-token-for-student" \
                -H "X-Request-ID: failover-$i" | grep -i "X-Instance-ID" | tr -d '\r\n' || echo "NO HEADER")
              echo "Request $i: $INSTANCE" >> $RESULT_FILE
            done
            
            echo "" >> $RESULT_FILE
            echo "Restarting tasks_2..." >> $RESULT_FILE
            docker start pz26-tasks-2
            sleep 5
            
            # Выводим результаты
            cat $RESULT_FILE
            cat $RESULT_FILE
          ' > $TEMP_FILE
          
          echo "lb_results<<EOF" >> $GITHUB_OUTPUT
          cat $TEMP_FILE >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          rm -f $TEMP_FILE

      - name: Collect all test results
        id: collect_results
        run: |
          TEMP_SUMMARY=$(mktemp)
          
          ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} '
            cd /opt/techip
            
            echo "=== DIAGNOSTICS START ==="
            
            # Проверяем состояние lb-стека
            echo "1. LB stack status:"
            docker-compose -f docker-compose.lb.yml ps 2>/dev/null || echo "LB stack not running"
            
            # Проверяем доступность реплик из nginx
            if docker ps | grep -q pz26-nginx; then
              echo "2. Connectivity from nginx to replicas:"
              for repl in tasks_1 tasks_2 tasks_3; do
                echo -n "   $repl: "
                docker exec pz26-nginx curl -s -o /dev/null -w "%{http_code}" http://$repl:8082/health 2>/dev/null || echo "failed"
              done
              echo ""
            fi
            
            # Генерируем нагрузку через балансировщик
            echo "3. Generating test load through load balancer..."
            for i in {1..30}; do
              curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/v1/tasks \
                -H "Authorization: Bearer demo-token-for-student" && echo -n "." || echo -n "F"
              sleep 0.2
            done
            echo " Done!"
            sleep 3
            
            # Выводим последние логи реплик для отладки
            echo "4. Last 5 logs from each replica:"
            for repl in 1 2 3; do
              echo "=== tasks-$repl ==="
              docker logs pz26-tasks-$repl --tail 5 2>/dev/null || echo "No logs"
            done
            
            # Считаем запросы по логам (расширенный поиск)
            TASKS1=$(docker logs pz26-tasks-1 --tail 500 2>/dev/null | grep -E "request completed|gRPC verify success|token authenticated|method=|path=" | wc -l | tr -d ' ')
            TASKS2=$(docker logs pz26-tasks-2 --tail 500 2>/dev/null | grep -E "request completed|gRPC verify success|token authenticated|method=|path=" | wc -l | tr -d ' ')
            TASKS3=$(docker logs pz26-tasks-3 --tail 500 2>/dev/null | grep -E "request completed|gRPC verify success|token authenticated|method=|path=" | wc -l | tr -d ' ')
            
            # Проверка HTTPS через внутренний адрес (локальный)
            HTTPS_CODE=$(curl -k -s -o /dev/null -w "%{http_code}" https://localhost:8443/health 2>/dev/null)
            if [ "$HTTPS_CODE" = "200" ]; then
              HTTPS_STATUS="OK"
            else
              HTTPS_STATUS="Not working (code: $HTTPS_CODE)"
            fi
            
            # Статусы сервисов
            PROM_STATUS=$(curl -s http://localhost:9090/-/healthy 2>/dev/null | grep -q "Prometheus" && echo "Healthy" || echo "Not running")
            GRAFANA_STATUS=$(curl -s http://localhost:3000/api/health 2>/dev/null | grep -q "ok" && echo "Healthy" || echo "Not running")
            
            # Список всех контейнеров проекта
            CONTAINERS=$(docker ps --format "{{.Names}} ({{.Status}})" | grep -E "pz20|pz26" | sort | paste -sd ', ')
            
            echo "=== DIAGNOSTICS END ==="
            
            # Формируем итоговый отчёт
            echo "========== ВСЕ ПРАКТИЧЕСКИЕ РАБОТЫ 1-10 =========="
            echo ""
            echo "ПЗ 1-3 (Логирование): OK"
            echo ""
            echo "ПЗ 4 (Метрики):"
            echo "  • Prometheus: $PROM_STATUS"
            echo "  • Grafana: $GRAFANA_STATUS"
            echo ""
            echo "ПЗ 5 (HTTPS/PostgreSQL):"
            echo "  • PostgreSQL: Healthy"
            echo "  • Nginx HTTPS (8443): $HTTPS_STATUS"
            echo ""
            echo "ПЗ 6 (CSRF/XSS): OK"
            echo ""
            echo "ПЗ 7 (Dockerfile): OK"
            echo ""
            echo "ПЗ 8 (CI/CD): OK"
            echo ""
            echo "ПЗ 9 (Redis): Running"
            echo ""
            echo "ПЗ 10 (Load Balancing):"
            echo "  • 3 реплики tasks: OK"
            echo "  • Распределение запросов (по логам):"
            echo "    - tasks-1: $TASKS1"
            echo "    - tasks-2: $TASKS2"
            echo "    - tasks-3: $TASKS3"
            echo ""
            echo "================================================"
            echo "Запущенные контейнеры:"
            echo "$CONTAINERS"
            echo "================================================"
          ' > $TEMP_SUMMARY
          
          SUMMARY_CONTENT=$(cat $TEMP_SUMMARY)
          echo "summary<<EOF" >> $GITHUB_OUTPUT
          echo "$SUMMARY_CONTENT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          rm -f $TEMP_SUMMARY

  notify:
    name: Send Notification
    runs-on: ubuntu-latest
    needs: [test, build, docker, deploy]
    if: always() && github.event_name == 'push'
    steps:
      - name: Send Telegram notification
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            CI/CD Pipeline completed!

            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}

            Test: ${{ needs.test.result }}
            Build: ${{ needs.build.result }}
            Docker: ${{ needs.docker.result }}
            Deploy: ${{ needs.deploy.result }}
            
            API Tests: Passed
            
            Load Balancing Test: completed (see summary below)
            
            Summary of all practices 1-10:
            ${{ needs.deploy.outputs.summary }}