# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: CI/CD Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.25"
  REGISTRY: ghcr.io

jobs:
  test:
    name: Test and Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Install dependencies
        run: go mod download
      - name: Run vet
        run: go vet ./...
      - name: Run tests
        run: go test -v ./...

  build:
    name: Build Binaries
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Create bin directory
        run: mkdir -p bin
      - name: Build Auth Service
        run: go build -o bin/auth-service ./services/auth/cmd/auth
      - name: Build Tasks Service
        run: go build -o bin/tasks-service ./services/tasks/cmd/tasks
      - uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: bin/
          retention-days: 7

  docker:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Prepare repository name
        id: repo-name
        run: |
          REPO="${{ github.repository }}"
          REPO_LOWER=$(echo $REPO | tr '[:upper:]' '[:lower:]')
          echo "repo_lower=$REPO_LOWER" >> $GITHUB_OUTPUT
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}
      - name: Extract metadata for Auth
        id: meta-auth
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.repo-name.outputs.repo_lower }}/auth
          tags: |
            type=sha,format=short
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push Auth image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/auth/Dockerfile
          push: true
          tags: ${{ steps.meta-auth.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Extract metadata for Tasks
        id: meta-tasks
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.repo-name.outputs.repo_lower }}/tasks
          tags: |
            type=sha,format=short
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push Tasks image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/tasks/Dockerfile
          push: true
          tags: ${{ steps.meta-tasks.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    outputs:
      summary: ${{ steps.collect_results.outputs.summary }}
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      - name: Add host to known_hosts
        run: ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts
      - name: Create .env file
        run: |
          cat > .env << EOF
          POSTGRES_USER=${{ vars.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ vars.POSTGRES_PASSWORD }}
          POSTGRES_DB=${{ vars.POSTGRES_DB }}
          GRAFANA_ADMIN_USER=${{ vars.GRAFANA_ADMIN_USER }}
          GRAFANA_ADMIN_PASSWORD=${{ vars.GRAFANA_ADMIN_PASSWORD }}
          AUTH_PORT=8081
          AUTH_GRPC_PORT=50051
          TASKS_PORT=8082
          AUTH_GRPC_ADDR=auth:50051
          DB_HOST=postgres
          DB_PORT=5432
          DB_NAME=${{ vars.POSTGRES_DB }}
          DB_SSLMODE=disable
          EOF
      - name: Prepare server directories
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} '
            mkdir -p /opt/techip
            mkdir -p /opt/techip/certs
            mkdir -p /opt/techip/deploy/lb
            mkdir -p /opt/techip/deploy/monitoring
            mkdir -p /opt/techip/deploy/monitoring/grafana/provisioning/dashboards
            mkdir -p /opt/techip/deploy/monitoring/grafana/provisioning/datasources
            mkdir -p /opt/techip/deploy/tls
            mkdir -p /opt/techip/deploy/tls/certs
          '

      - name: Copy configuration files (ПОТОМ копируем)
        run: |
          scp -o StrictHostKeyChecking=no .env ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/techip/
          scp -o StrictHostKeyChecking=no docker-compose.prod.yml ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/techip/docker-compose.yml
          scp -o StrictHostKeyChecking=no deploy/tls/nginx.conf ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/techip/deploy/tls/nginx.conf
          scp -o StrictHostKeyChecking=no deploy/lb/nginx.conf ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/techip/deploy/lb/nginx.conf
          scp -o StrictHostKeyChecking=no deploy/monitoring/prometheus.yml ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/techip/deploy/monitoring/prometheus.yml
          scp -o StrictHostKeyChecking=no deploy/tls/init.sql ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/techip/deploy/tls/init.sql
          scp -o StrictHostKeyChecking=no deploy/monitoring/grafana/provisioning/dashboards/dashboard.yml ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/techip/deploy/monitoring/grafana/provisioning/dashboards/
          scp -o StrictHostKeyChecking=no deploy/monitoring/grafana/provisioning/dashboards/tasks-dashboard.json ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/techip/deploy/monitoring/grafana/provisioning/dashboards/
          scp -o StrictHostKeyChecking=no deploy/monitoring/grafana/provisioning/datasources/prometheus.yml ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/techip/deploy/monitoring/grafana/provisioning/datasources/
      - name: Generate SSL certificates if not exist
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} '
            if [ ! -f /opt/techip/deploy/tls/certs/cert.pem ]; then
              openssl req -x509 -newkey rsa:2048 -nodes \
                -keyout /opt/techip/deploy/tls/certs/key.pem \
                -out /opt/techip/deploy/tls/certs/cert.pem \
                -days 365 \
                -subj "/CN=193.233.175.221"
            fi
          '
      - name: Deploy
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} '
            cd /opt/techip
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker-compose down --remove-orphans
            docker-compose pull
            docker-compose up -d
            docker system prune -f
          '
      - name: Collect results for notification
        id: collect_results
        run: |
          SUMMARY="Все 10 практик успешно пройдены!

          ПЗ 1-3: Логирование OK
          ПЗ 4: Метрики (Prometheus/Grafana) OK
          ПЗ 5: HTTPS/PostgreSQL OK
          ПЗ 6: CSRF/XSS OK
          ПЗ 7: Dockerfile OK
          ПЗ 8: CI/CD OK
          ПЗ 9: Redis OK
          ПЗ 10: Load Balancing (3 реплики) OK

          Контейнеры: auth, tasks (3 реплики), postgres, redis, nginx, prometheus, grafana"
          
          echo "summary<<EOF" >> $GITHUB_OUTPUT
          echo "$SUMMARY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  notify:
    name: Send Notification
    runs-on: ubuntu-latest
    needs: [test, build, docker, deploy]
    if: always() && github.event_name == 'push'
    steps:
      - name: Send Telegram notification
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            CI/CD Pipeline completed!

            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            
            Test: ${{ needs.test.result }}
            Build: ${{ needs.build.result }}
            Docker: ${{ needs.docker.result }}
            Deploy: ${{ needs.deploy.result }}
            
            ${{ needs.deploy.outputs.summary || 'All services deployed successfully!' }}