# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: CI/CD Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.25"
  REGISTRY: ghcr.io

jobs:
  test:
    name: Test and Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Install dependencies
        run: go mod download
      - name: Run vet
        run: go vet ./...
      - name: Run tests
        run: go test -v ./...

  build:
    name: Build Binaries
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Create bin directory
        run: mkdir -p bin
      - name: Build Auth Service
        run: go build -o bin/auth-service ./services/auth/cmd/auth
      - name: Build Tasks Service
        run: go build -o bin/tasks-service ./services/tasks/cmd/tasks
      - name: Build GraphQL Service
        run: go build -o bin/graphql-service ./services/graphql/cmd/graphql
      - name: Build Worker Service
        run: go build -o bin/worker-service ./services/worker/cmd/worker
      - uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: bin/
          retention-days: 7

  docker:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Prepare repository name
        id: repo-name
        run: |
          REPO="${{ github.repository }}"
          REPO_LOWER=$(echo $REPO | tr '[:upper:]' '[:lower:]')
          echo "repo_lower=$REPO_LOWER" >> $GITHUB_OUTPUT
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}
      
      # Auth Service
      - name: Extract metadata for Auth
        id: meta-auth
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.repo-name.outputs.repo_lower }}/auth
          tags: |
            type=sha,format=short
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push Auth image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/auth/Dockerfile
          push: true
          tags: ${{ steps.meta-auth.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      # Tasks Service
      - name: Extract metadata for Tasks
        id: meta-tasks
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.repo-name.outputs.repo_lower }}/tasks
          tags: |
            type=sha,format=short
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push Tasks image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/tasks/Dockerfile
          push: true
          tags: ${{ steps.meta-tasks.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      # GraphQL Service
      - name: Extract metadata for GraphQL
        id: meta-graphql
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.repo-name.outputs.repo_lower }}/graphql
          tags: |
            type=sha,format=short
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push GraphQL image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/graphql/Dockerfile
          push: true
          tags: ${{ steps.meta-graphql.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Worker Service
      - name: Extract metadata for Worker
        id: meta-worker
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.repo-name.outputs.repo_lower }}/worker
          tags: |
            type=sha,format=short
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push Worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/worker/Dockerfile
          push: true
          tags: ${{ steps.meta-worker.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    outputs:
      summary: ${{ steps.collect_results.outputs.summary }}
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      - name: Add host to known_hosts
        run: ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts
      
      - name: FULL CLEANUP - Remove everything
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} '
            echo "=== FULL CLEANUP ==="
            
            # Остановка и удаление всех контейнеров
            cd /opt/techip 2>/dev/null && docker-compose down -v --remove-orphans 2>/dev/null || true
            
            # Удаление всех контейнеров
            docker container prune -f 2>/dev/null || true
            
            # Удаление всех томов
            docker volume prune -f 2>/dev/null || true
            
            # Удаление директории проекта
            rm -rf /opt/techip
            
            echo "Cleanup completed"
          '
      
      - name: Create .env file from variables
        run: |
          cat > .env << EOF
          # PostgreSQL
          POSTGRES_USER=${{ vars.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.DB_PASSWORD }}
          POSTGRES_DB=${{ vars.DB_NAME }}
          
          # Grafana
          GRAFANA_ADMIN_USER=${{ vars.GRAFANA_ADMIN_USER }}
          GRAFANA_ADMIN_PASSWORD=${{ vars.GRAFANA_ADMIN_PASSWORD }}
          
          # Auth Service
          AUTH_PORT=${{ vars.AUTH_PORT }}
          AUTH_GRPC_PORT=${{ vars.AUTH_GRPC_PORT }}
          
          # Tasks Service
          TASKS_PORT=${{ vars.TASKS_PORT }}
          AUTH_GRPC_ADDR=${{ vars.AUTH_GRPC_ADDR }}
          
          # Database connection
          DB_HOST=${{ vars.DB_HOST }}
          DB_PORT=${{ vars.DB_PORT }}
          DB_NAME=${{ vars.DB_NAME }}
          DB_SSLMODE=${{ vars.DB_SSLMODE }}
          
          # Redis
          REDIS_ADDR=${{ vars.REDIS_ADDR }}
          REDIS_PASSWORD=
          REDIS_DB=${{ vars.REDIS_DB }}
          CACHE_TTL_SECONDS=${{ vars.CACHE_TTL_SECONDS }}
          CACHE_TTL_JITTER_SECONDS=${{ vars.CACHE_TTL_JITTER_SECONDS }}
          
          # Tasks instances
          TASKS_MAIN_INSTANCE_ID=tasks-main
          TASKS_1_INSTANCE_ID=tasks-1
          TASKS_2_INSTANCE_ID=tasks-2
          TASKS_3_INSTANCE_ID=tasks-3
          
          # RabbitMQ
          RABBITMQ_URL=amqp://${{ secrets.RABBITMQ_USER }}:${{ secrets.RABBITMQ_PASS }}@rabbitmq:5672/
          RABBITMQ_QUEUE=${{ vars.RABBITMQ_QUEUE }}
          RABBITMQ_PREFETCH=${{ vars.RABBITMQ_PREFETCH }}
          RABBITMQ_USER=${{ secrets.RABBITMQ_USER }}
          RABBITMQ_PASS=${{ secrets.RABBITMQ_PASS }}
          RABBITMQ_AMQP_PORT=5672
          RABBITMQ_MGMT_PORT=15672
          WORKER_ID=${{ vars.WORKER_ID }}
          WORKER_ID_2=${{ vars.WORKER_ID_2 }}
          
          # Ports
          LB_PORT=8080
          HTTP_PORT=80
          HTTPS_PORT=443
          NGINX_HTTPS_PORT=8443
          PROMETHEUS_PORT=9090
          GRAFANA_PORT=3000
          GRAPHQL_PORT=8090
          
          # Paths
          CERTS_PATH=/opt/techip/certs
          EOF
      
      - name: Prepare server directories
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} '
            mkdir -p /opt/techip
            mkdir -p /opt/techip/certs
            mkdir -p /opt/techip/deploy/lb
            mkdir -p /opt/techip/deploy/monitoring
            mkdir -p /opt/techip/deploy/monitoring/grafana/provisioning/dashboards
            mkdir -p /opt/techip/deploy/monitoring/grafana/provisioning/datasources
            mkdir -p /opt/techip/deploy/tls
            mkdir -p /opt/techip/deploy/tls/certs
          '

      - name: Copy configuration files
        run: |
          scp -o StrictHostKeyChecking=no .env ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/techip/
          scp -o StrictHostKeyChecking=no docker-compose.prod.yml ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/techip/docker-compose.yml
          scp -o StrictHostKeyChecking=no deploy/tls/nginx.conf ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/techip/deploy/tls/nginx.conf
          scp -o StrictHostKeyChecking=no deploy/lb/nginx.conf ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/techip/deploy/lb/nginx.conf
          scp -o StrictHostKeyChecking=no deploy/monitoring/prometheus.yml ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/techip/deploy/monitoring/prometheus.yml
          scp -o StrictHostKeyChecking=no deploy/tls/init.sql ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/techip/deploy/tls/init.sql
          scp -o StrictHostKeyChecking=no deploy/monitoring/grafana/provisioning/dashboards/dashboard.yml ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/techip/deploy/monitoring/grafana/provisioning/dashboards/
          scp -o StrictHostKeyChecking=no deploy/monitoring/grafana/provisioning/dashboards/tasks-dashboard.json ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/techip/deploy/monitoring/grafana/provisioning/dashboards/
          scp -o StrictHostKeyChecking=no deploy/monitoring/grafana/provisioning/datasources/prometheus.yml ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/techip/deploy/monitoring/grafana/provisioning/datasources/
      
      - name: Generate SSL certificates if not exist
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} '
            if [ ! -f /opt/techip/deploy/tls/certs/cert.pem ]; then
              openssl req -x509 -newkey rsa:2048 -nodes \
                -keyout /opt/techip/deploy/tls/certs/key.pem \
                -out /opt/techip/deploy/tls/certs/cert.pem \
                -days 365 \
                -subj "/CN=${{ secrets.VPS_HOST }}"
            fi
          '
      
      - name: Deploy
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} '
            cd /opt/techip
            echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker-compose pull
            docker-compose up -d
            sleep 20
            docker system prune -f
          '
      
      - name: Verify deployment
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} '
            cd /opt/techip
            echo "=== CONTAINER STATUS ==="
            docker-compose ps
            
            echo ""
            echo "=== SERVICE HEALTH ==="
            
            # Auth check
            AUTH_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8081/v1/auth/verify -H "Authorization: Bearer demo-token-for-student" || echo "failed")
            echo "Auth service: $AUTH_STATUS"
            
            # Tasks check
            TASKS_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8082/v1/tasks -H "Authorization: Bearer demo-token-for-student" || echo "failed")
            echo "Tasks service: $TASKS_STATUS"
            
            # GraphQL check
            GRAPHQL_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8090/health || echo "failed")
            echo "GraphQL service: $GRAPHQL_STATUS"
            
            # Test RabbitMQ connection
            echo ""
            echo "=== RABBITMQ CHECK ==="
            docker logs pz20-tasks --tail 20 | grep -i rabbit || echo "No rabbit logs yet"

            # Проверка job очередей
            echo ""
            echo "=== JOB QUEUES CHECK ==="
            docker exec pz29-rabbitmq rabbitmqctl list_queues name messages | grep -E "task_jobs|task_jobs_retry|task_jobs_dlq" || echo "Queues not found"

            # Тест создания задания
            echo ""
            echo "=== JOB CREATION TEST ==="
            JOB_RESPONSE=$(curl -s -X POST http://localhost:8082/v1/jobs/process-task \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer demo-token-for-student" \
              -d '{"task_id":"ci-test-job"}')
            echo "Job response: $JOB_RESPONSE"
          '
      
      - name: Collect results for notification
        id: collect_results
        run: |
          SUMMARY="CI/CD Pipeline завершен успешно!
          
          Репозиторий: ${{ github.repository }}
          Ветка: ${{ github.ref_name }}
          Коммит: ${{ github.sha }}
          
          Запущенные сервисы:
          • Auth (HTTP:8081, gRPC:50051)
          • Tasks (3 реплики)
          • GraphQL (порт 8090)
          • PostgreSQL
          • Redis
          • RabbitMQ
          • Worker (2 экземпляра)
          • Prometheus + Grafana
          • NGINX (HTTPS + LB)"
          
          echo "summary<<EOF" >> $GITHUB_OUTPUT
          echo "$SUMMARY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  notify:
    name: Send Notification
    runs-on: ubuntu-latest
    needs: [test, build, docker, deploy]
    if: always() && github.event_name == 'push'
    steps:
      - name: Send Telegram notification
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            Test: ${{ needs.test.result }}
            Build: ${{ needs.build.result }}
            Docker: ${{ needs.docker.result }}
            Deploy: ${{ needs.deploy.result }}
            
            ${{ needs.deploy.outputs.summary }}