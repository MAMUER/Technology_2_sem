services:
  postgres:
    image: postgres:15-alpine
    container_name: pz20-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./deploy/tls/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - pz20-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: pz20-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - pz20-network
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  auth:
    image: ghcr.io/mamuer/technology_2_sem/auth:latest
    container_name: pz20-auth
    ports:
      - "8081:8081"
      - "50051:50051"
    environment:
      - AUTH_PORT=${AUTH_PORT}
      - AUTH_GRPC_PORT=${AUTH_GRPC_PORT}
    env_file:
      - .env
    networks:
      - pz20-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/v1/auth/verify", "--header=Authorization: Bearer demo-token-for-student"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.3'
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  tasks:
    image: ghcr.io/mamuer/technology_2_sem/tasks:latest
    container_name: pz20-tasks
    ports:
      - "8082:8082"
    environment:
      - TASKS_PORT=${TASKS_PORT}
      - AUTH_GRPC_ADDR=${AUTH_GRPC_ADDR}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
      - DB_SSLMODE=${DB_SSLMODE}
      - REDIS_ADDR=${REDIS_ADDR}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_DB=${REDIS_DB}
      - CACHE_TTL_SECONDS=${CACHE_TTL_SECONDS}
      - CACHE_TTL_JITTER_SECONDS=${CACHE_TTL_JITTER_SECONDS}
      - INSTANCE_ID=${TASKS_MAIN_INSTANCE_ID}
      - RABBITMQ_URL=${RABBITMQ_URL}
      - RABBITMQ_QUEUE=${RABBITMQ_QUEUE}
    env_file:
      - .env
    networks:
      - pz20-network
    depends_on:
      auth:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8082/ready"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.3'
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  tasks_1:
    image: ghcr.io/mamuer/technology_2_sem/tasks:latest
    container_name: pz26-tasks-1
    environment:
      - TASKS_PORT=${TASKS_PORT}
      - AUTH_GRPC_ADDR=${AUTH_GRPC_ADDR}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
      - DB_SSLMODE=${DB_SSLMODE}
      - REDIS_ADDR=${REDIS_ADDR}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_DB=${REDIS_DB}
      - CACHE_TTL_SECONDS=${CACHE_TTL_SECONDS}
      - CACHE_TTL_JITTER_SECONDS=${CACHE_TTL_JITTER_SECONDS}
      - INSTANCE_ID=${TASKS_1_INSTANCE_ID}
    env_file:
      - .env
    networks:
      - pz20-network
    depends_on:
      auth:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.3'
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  tasks_2:
    image: ghcr.io/mamuer/technology_2_sem/tasks:latest
    container_name: pz26-tasks-2
    environment:
      - TASKS_PORT=${TASKS_PORT}
      - AUTH_GRPC_ADDR=${AUTH_GRPC_ADDR}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
      - DB_SSLMODE=${DB_SSLMODE}
      - REDIS_ADDR=${REDIS_ADDR}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_DB=${REDIS_DB}
      - CACHE_TTL_SECONDS=${CACHE_TTL_SECONDS}
      - CACHE_TTL_JITTER_SECONDS=${CACHE_TTL_JITTER_SECONDS}
      - INSTANCE_ID=${TASKS_2_INSTANCE_ID}
    env_file:
      - .env
    networks:
      - pz20-network
    depends_on:
      auth:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.3'
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  tasks_3:
    image: ghcr.io/mamuer/technology_2_sem/tasks:latest
    container_name: pz26-tasks-3
    environment:
      - TASKS_PORT=${TASKS_PORT}
      - AUTH_GRPC_ADDR=${AUTH_GRPC_ADDR}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
      - DB_SSLMODE=${DB_SSLMODE}
      - REDIS_ADDR=${REDIS_ADDR}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_DB=${REDIS_DB}
      - CACHE_TTL_SECONDS=${CACHE_TTL_SECONDS}
      - CACHE_TTL_JITTER_SECONDS=${CACHE_TTL_JITTER_SECONDS}
      - INSTANCE_ID=${TASKS_3_INSTANCE_ID}
    env_file:
      - .env
    networks:
      - pz20-network
    depends_on:
      auth:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.3'
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx-lb:
    image: nginx:alpine
    container_name: pz26-nginx
    ports:
      - "${LB_PORT}:${LB_PORT}"
    volumes:
      - ./deploy/lb/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - pz20-network
    depends_on:
      tasks_1:
        condition: service_started
      tasks_2:
        condition: service_started
      tasks_3:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.1'
        reservations:
          memory: 32M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  nginx-https:
    image: nginx:alpine
    container_name: pz20-nginx
    ports:
      - "${HTTP_PORT}:${HTTP_PORT}"
      - "${HTTPS_PORT}:${HTTPS_PORT}"
      - "${NGINX_HTTPS_PORT}:${NGINX_HTTPS_PORT}"
    volumes:
      - ./deploy/tls/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/tls/certs:${CERTS_PATH}:ro
    networks:
      - pz20-network
    depends_on:
      tasks:
        condition: service_healthy
      auth:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.1'
        reservations:
          memory: 32M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  prometheus:
    image: prom/prometheus:latest
    container_name: pz20-prometheus
    ports:
      - "${PROMETHEUS_PORT}:${PROMETHEUS_PORT}"
    volumes:
      - ./deploy/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=10GB'
    networks:
      - pz20-network
    restart: unless-stopped
    depends_on:
      tasks:
        condition: service_started
      auth:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  grafana:
    image: grafana/grafana:latest
    container_name: pz20-grafana
    ports:
      - "${GRAFANA_PORT}:${GRAFANA_PORT}"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    env_file:
      - .env
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deploy/monitoring/grafana/provisioning:/etc/grafana/provisioning
    networks:
      - pz20-network
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.2'
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  graphql:
    image: ghcr.io/mamuer/technology_2_sem/graphql:latest
    container_name: pz27-graphql
    ports:
      - "${GRAPHQL_PORT}:${GRAPHQL_PORT}"
    environment:
      - GRAPHQL_PORT=${GRAPHQL_PORT}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
      - DB_SSLMODE=${DB_SSLMODE}
    env_file:
      - .env
    networks:
      - pz20-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.3'
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: pz29-rabbitmq
    ports:
      - "${RABBITMQ_AMQP_PORT}:5672"
      - "${RABBITMQ_MGMT_PORT}:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASS}
      - RABBITMQ_DEFAULT_VHOST=/
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - pz20-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  worker:
    image: ghcr.io/mamuer/technology_2_sem/worker:latest
    container_name: pz29-worker
    environment:
      - WORKER_ID=${WORKER_ID}
      - RABBITMQ_URL=${RABBITMQ_URL}
      - RABBITMQ_QUEUE=${RABBITMQ_QUEUE}
      - RABBITMQ_PREFETCH=${RABBITMQ_PREFETCH}
    env_file:
      - .env
    networks:
      - pz20-network
    depends_on:
      rabbitmq:
        condition: service_healthy
      tasks:
        condition: service_healthy           
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.3'
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  worker_2:
    image: ghcr.io/mamuer/technology_2_sem/worker:latest
    container_name: pz29-worker-2
    environment:
      - WORKER_ID=${WORKER_ID_2}
      - RABBITMQ_URL=${RABBITMQ_URL}
      - RABBITMQ_QUEUE=${RABBITMQ_QUEUE}
      - RABBITMQ_PREFETCH=${RABBITMQ_PREFETCH}
    env_file:
      - .env
    networks:
      - pz20-network
    depends_on:
      rabbitmq:
        condition: service_healthy
      tasks:
        condition: service_healthy       
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.3'
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  pz20-network:
    driver: bridge

volumes:
  rabbitmq-data:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data: