services:
  auth:
    image: ghcr.io/mamuer/technology_2_sem/auth:latest
    container_name: pz20-auth
    ports:
      - "8081:8081"
      - "50051:50051"
    environment:
      - AUTH_PORT=${AUTH_PORT}
      - AUTH_GRPC_PORT=${AUTH_GRPC_PORT}
    env_file:
      - .env
    networks:
      - pz20-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  tasks:
    image: ghcr.io/mamuer/technology_2_sem/tasks:latest
    container_name: pz20-tasks
    ports:
      - "8082:8082"
    environment:
      - TASKS_PORT=${TASKS_PORT}
      - AUTH_GRPC_ADDR=${AUTH_GRPC_ADDR}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
      - DB_SSLMODE=${DB_SSLMODE}
      # Redis Cache
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=
      - REDIS_DB=0
      - CACHE_TTL_SECONDS=120
      - CACHE_TTL_JITTER_SECONDS=30
    env_file:
      - .env
    depends_on:
      - auth
      - postgres
      - redis
    networks:
      - pz20-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:15-alpine
    container_name: pz20-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - pz20-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  redis:
    image: redis:7-alpine
    container_name: pz20-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - pz20-network
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: pz20-nginx
    ports:
      - "8443:8443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/opt/techip/certs:ro
    depends_on:
      - tasks
      - auth
    networks:
      - pz20-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 32M

  prometheus:
    image: prom/prometheus:latest
    container_name: pz20-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - pz20-network
    restart: unless-stopped
    depends_on:
      - tasks
      - auth
    deploy:
      resources:
        limits:
          memory: 256M

  grafana:
    image: grafana/grafana:latest
    container_name: pz20-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    env_file:
      - .env
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - pz20-network
    restart: unless-stopped
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          memory: 128M

networks:
  pz20-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data: