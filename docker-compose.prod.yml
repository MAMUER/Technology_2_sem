services:
  auth:
    image: ghcr.io/mamuer/technology_2_sem/auth:latest
    container_name: pz20-auth
    ports:
      - "8081:8081"
      - "50051:50051"
    environment:
      - AUTH_PORT=${AUTH_PORT}
      - AUTH_GRPC_PORT=${AUTH_GRPC_PORT}
    env_file:
      - .env
    networks:
      - pz20-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/v1/auth/verify", "--header=Authorization: Bearer demo-token-for-student"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  tasks:
    image: ghcr.io/mamuer/technology_2_sem/tasks:latest
    container_name: pz20-tasks
    ports:
      - "8082:8082"
    environment:
      - TASKS_PORT=${TASKS_PORT}
      - AUTH_GRPC_ADDR=${AUTH_GRPC_ADDR}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
      - DB_SSLMODE=${DB_SSLMODE}
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=
      - REDIS_DB=0
      - CACHE_TTL_SECONDS=120
      - CACHE_TTL_JITTER_SECONDS=30
      - INSTANCE_ID=tasks-main
    env_file:
      - .env
    depends_on:
      auth:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - pz20-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8082/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  postgres:
    image: postgres:15-alpine
    container_name: pz20-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - pz20-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pz20-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - pz20-network
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: pz20-nginx
    ports:
      - "80:80"
      - "443:443"
      - "8443:8443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/opt/techip/certs:ro
    depends_on:
      tasks:
        condition: service_healthy
      auth:
        condition: service_healthy
    networks:
      - pz20-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: pz20-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - pz20-network
    restart: unless-stopped
    depends_on:
      - tasks
      - auth

  grafana:
    image: grafana/grafana:latest
    container_name: pz20-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    env_file:
      - .env
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - pz20-network
    restart: unless-stopped
    depends_on:
      - prometheus

  # Load Balancer Stack
  lb-setup:
    image: alpine:latest
    container_name: pz20-lb-setup
    command: |
      sh -c "
        echo 'Setting up load balancer...'
        apk add --no-cache curl docker-cli
        cd /opt/techip/deploy/lb
        docker-compose -f docker-compose.yml pull
        docker-compose -f docker-compose.yml up -d --remove-orphans
        echo 'Load balancer started'
        tail -f /dev/null
      "
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./deploy/lb:/opt/techip/deploy/lb
    restart: unless-stopped
    depends_on:
      tasks:
        condition: service_healthy
      auth:
        condition: service_healthy

networks:
  pz20-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data: