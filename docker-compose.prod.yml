services:
  postgres:
    image: postgres:15-alpine
    container_name: pz20-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./deploy/tls/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - pz20-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: pz20-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - pz20-network
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  auth:
    image: ghcr.io/mamuer/technology_2_sem/auth:latest
    container_name: pz20-auth
    ports:
      - "8081:8081"
      - "50051:50051"
    environment:
      - AUTH_PORT=${AUTH_PORT}
      - AUTH_GRPC_PORT=${AUTH_GRPC_PORT}
    env_file:
      - .env
    networks:
      - pz20-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/v1/auth/verify", "--header=Authorization: Bearer demo-token-for-student"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  tasks:
    image: ghcr.io/mamuer/technology_2_sem/tasks:latest
    container_name: pz20-tasks
    ports:
      - "8082:8082"
    environment:
      - TASKS_PORT=${TASKS_PORT}
      - AUTH_GRPC_ADDR=${AUTH_GRPC_ADDR}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
      - DB_SSLMODE=${DB_SSLMODE}
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=
      - REDIS_DB=0
      - CACHE_TTL_SECONDS=120
      - CACHE_TTL_JITTER_SECONDS=30
      - INSTANCE_ID=tasks-main
      - RABBITMQ_URL=${RABBITMQ_URL}
      - RABBITMQ_QUEUE=${RABBITMQ_QUEUE}
    env_file:
      - .env
    networks:
      - pz20-network
    depends_on:
      auth:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  tasks_1:
    image: ghcr.io/mamuer/technology_2_sem/tasks:latest
    container_name: pz26-tasks-1
    environment:
      - TASKS_PORT=8082
      - AUTH_GRPC_ADDR=auth:50051
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
      - DB_SSLMODE=disable
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=
      - REDIS_DB=0
      - CACHE_TTL_SECONDS=120
      - CACHE_TTL_JITTER_SECONDS=30
      - INSTANCE_ID=tasks-1
    env_file:
      - .env
    networks:
      - pz20-network
    depends_on:
      auth:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  tasks_2:
    image: ghcr.io/mamuer/technology_2_sem/tasks:latest
    container_name: pz26-tasks-2
    environment:
      - TASKS_PORT=8082
      - AUTH_GRPC_ADDR=auth:50051
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
      - DB_SSLMODE=disable
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=
      - REDIS_DB=0
      - CACHE_TTL_SECONDS=120
      - CACHE_TTL_JITTER_SECONDS=30
      - INSTANCE_ID=tasks-2
    env_file:
      - .env
    networks:
      - pz20-network
    depends_on:
      auth:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  tasks_3:
    image: ghcr.io/mamuer/technology_2_sem/tasks:latest
    container_name: pz26-tasks-3
    environment:
      - TASKS_PORT=8082
      - AUTH_GRPC_ADDR=auth:50051
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
      - DB_SSLMODE=disable
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=
      - REDIS_DB=0
      - CACHE_TTL_SECONDS=120
      - CACHE_TTL_JITTER_SECONDS=30
      - INSTANCE_ID=tasks-3
    env_file:
      - .env
    networks:
      - pz20-network
    depends_on:
      auth:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  nginx-lb:
    image: nginx:alpine
    container_name: pz26-nginx
    ports:
      - "8080:8080"
    volumes:
      - ./deploy/lb/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - pz20-network
    depends_on:
      tasks_1:
        condition: service_started
      tasks_2:
        condition: service_started
      tasks_3:
        condition: service_started
    restart: unless-stopped

  nginx-https:
    image: nginx:alpine
    container_name: pz20-nginx
    ports:
      - "80:80"
      - "443:443"
      - "8443:8443"
    volumes:
      - ./deploy/tls/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/tls/certs:/opt/techip/certs:ro
    networks:
      - pz20-network
    depends_on:
      tasks:
        condition: service_healthy
      auth:
        condition: service_healthy
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: pz20-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - pz20-network
    restart: unless-stopped
    depends_on:
      tasks:
        condition: service_started
      auth:
        condition: service_started

  grafana:
    image: grafana/grafana:latest
    container_name: pz20-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    env_file:
      - .env
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deploy/monitoring/grafana/provisioning:/etc/grafana/provisioning
    networks:
      - pz20-network
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_started

  graphql:
    image: ghcr.io/mamuer/technology_2_sem/graphql:latest
    container_name: pz27-graphql
    ports:
      - "8090:8090"
    environment:
      - GRAPHQL_PORT=8090
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
      - DB_SSLMODE=disable
    env_file:
      - .env
    networks:
      - pz20-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: pz29-rabbitmq
    ports:
      - "5672:5672"      # AMQP
      - "15672:15672"    # Management UI
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASS}
      - RABBITMQ_DEFAULT_VHOST=/
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - pz20-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  worker:
    image: ghcr.io/mamuer/technology_2_sem/worker:latest
    container_name: pz29-worker
    environment:
      - WORKER_ID=worker-1
      - RABBITMQ_URL=${RABBITMQ_URL}
      - RABBITMQ_QUEUE=${RABBITMQ_QUEUE}
      - RABBITMQ_PREFETCH=1
    env_file:
      - .env
    networks:
      - pz20-network
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  # Можно запустить несколько экземпляров worker для демонстрации
  worker_2:
    image: ghcr.io/mamuer/technology_2_sem/worker:latest
    container_name: pz29-worker-2
    environment:
      - WORKER_ID=worker-2
      - RABBITMQ_URL=${RABBITMQ_URL}
      - RABBITMQ_QUEUE=${RABBITMQ_QUEUE}
      - RABBITMQ_PREFETCH=1
    env_file:
      - .env
    networks:
      - pz20-network
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

networks:
  pz20-network:
    driver: bridge

volumes:
  rabbitmq-data:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data: