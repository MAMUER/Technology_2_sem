services:
  auth:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    container_name: pz20-auth
    ports:
      - "8081:8081"
      - "50051:50051"
    environment:
      - AUTH_PORT=${AUTH_PORT}
      - AUTH_GRPC_PORT=${AUTH_GRPC_PORT}
    env_file:
      - .env
    networks:
      - pz20-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/v1/auth/verify", "--header=Authorization: Bearer demo-token-for-student"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  tasks:
    build:
      context: .
      dockerfile: services/tasks/Dockerfile
    container_name: pz20-tasks
    ports:
      - "8082:8082"
    environment:
      - TASKS_PORT=${TASKS_PORT}
      - AUTH_GRPC_ADDR=${AUTH_GRPC_ADDR}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
      - DB_SSLMODE=${DB_SSLMODE}
    env_file:
      - .env
    depends_on:
      auth:
        condition: service_healthy
    networks:
      - pz20-network
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: pz20-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./deploy/tls/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - pz20-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: pz20-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - pz20-network
    restart: unless-stopped
    depends_on:
      - tasks
      - auth

  grafana:
    image: grafana/grafana:latest
    container_name: pz20-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    env_file:
      - .env
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deploy/monitoring/grafana/provisioning:/etc/grafana/provisioning
    networks:
      - pz20-network
    restart: unless-stopped
    depends_on:
      - prometheus

  nginx:
    image: nginx:alpine
    container_name: pz20-nginx
    ports:
      - "8443:8443"
    volumes:
      - ./deploy/tls/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/tls/certs:/etc/nginx/tls:ro
    depends_on:
      - tasks
      - auth
    networks:
      - pz20-network
    restart: unless-stopped

networks:
  pz20-network:
    driver: bridge

volumes:
  postgres-data:
  prometheus-data:
  grafana-data: